<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="studybuddy_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>studybuddy_mobile</title>
  <link rel="manifest" href="manifest.json">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #1a365d;
    }

    .loading-container {
      text-align: center;
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      background: #f2a14b ;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-left: auto;
      margin-right: auto;
    }

    .logo svg {
      width: 70px;
      height: 70px;
      fill: white;
    }

    .loading-text {
      font-size: 22px;
      font-weight: 600;
      margin-top: 20px;
      color: #2d3748;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(37, 117, 252, 0.2);
      border-top: 4px solid #2575fc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    .tip {
      font-size: 14px;
      color: #718096;
      margin-top: 15px;
      font-weight: 300;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .loading-container {
        padding: 20px;
        width: 95%;
      }

      .logo {
        width: 100px;
        height: 100px;
      }

      .loading-text {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="logo">
      <img src="logo.png" alt="StudyBuddy Logo" width="70" height="70">
    </div>
    <div class="loading-text">StudyBuddy is starting up</div>
    <div class="spinner"></div>
    <div class="tip">Preparing your learning environment...</div>
  </div>
 
  <script src="flutter_bootstrap.js" async></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js" defer></script>



  <script>
    // Optional: Add dynamic loading tips
    const tips = [
      "Gathering your study materials...",
      "Warming up the learning engine...",
      "Setting up your personalized workspace...",
      "Charging up motivation...",
      "Preparing smart study tools..."
    ];

    const tipElement = document.querySelector('.tip');
    let currentTipIndex = 0;

    function rotateTips() {
      tipElement.textContent = tips[currentTipIndex];
      currentTipIndex = (currentTipIndex + 1) % tips.length;
    }

    // Rotate tips every 3 seconds
    setInterval(rotateTips, 3000);
  </script>
</body>
</html>
