<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="La tua app per studiare">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="StudyBuddy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>StudyBuddy Web</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Fonts and external resources */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    @import 'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css';
    
    /* Variables */
    :root {
      --color-primary: #3a9b9b;
      --color-secondary: #6366f1;
      --color-background: #003737;
      --color-surface: #fdffff;
      --color-text: #1f2937;
      --color-text-secondary: #6b7280;
    }
    
    /* Base styles */
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--color-background);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 28rem;
      width: 91.666667%;
      background-color: var(--color-surface);
    }
    
    /* Typography */
    .text-primary {
      color: var(--color-primary);
    }
    
    /* Progress Bar */
    .progress-container {
      position: relative;
      width: 100%;
      height: 1rem;
      background-color: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
    }
    
    .progress-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background-color: var(--color-primary);
      border-radius: 9999px;
      animation: progress-animation 2.5s ease-out infinite;
    }
    
    /* Animations */
    @keyframes progress-animation {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Logo -->
    <div class="mb-6">
      <img src="logo_scritta_black.png" alt="StudyBuddy Logo" class="h-[150px] object-contain">
    </div>
    
    <!-- Status Message -->
    <h1 id="statusDisplay" class="text-xl font-bold mb-4 text-primary">
      Loading resources...
    </h1>
    
    <!-- Progress bar with CSS animation -->
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>


  <script>
    // Simplified tip rotation
    const tips = [
      "Caricando il timer...",
      "Scrapando gli esami...",
      "Calcolando la Streak...",
      "Facendo il caffè...",
      "Cercando l'oro nei fiumi..."
    ];

    const statusDisplay = document.getElementById('statusDisplay');
    let currentTipIndex = 0;

    // Simple tip rotation without typewriter effect
    function rotateTips() {
      statusDisplay.textContent = tips[currentTipIndex];
      currentTipIndex = (currentTipIndex + 1) % tips.length;
    }

    // Initial call and interval for tip rotation
    rotateTips();
    setInterval(rotateTips, 4000);
  </script>

    <!-- Scripts -->
    <script src="flutter_bootstrap.js" async></script>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js" defer></script>
  
</body>
</html>
