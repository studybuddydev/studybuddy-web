<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="studybuddy_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>studybuddy_mobile</title>
  <link rel="manifest" href="manifest.json">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    /* Tailwind CSS imports */
    @import 'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css';
    </style>
  </head>
  <body class="flex justify-center items-center h-screen font-['Poppins']" style="background-color: var(--color-background)">
    <div class="flex flex-col items-center p-6 rounded-lg shadow-md max-w-md w-11/12" style="background-color: var(--color-surface)">
      <!-- Logo -->
      <div class="mb-6">
        <img src="logo_scritta.png" alt="StudyBuddy Logo" class="h-[150px] object-contain">
      </div>
      
      <!-- Title -->
      <h1 class="text-xl font-bold mb-4 text-primary">
        StudyBuddy is starting up
      </h1>
      
      <!-- Simple spinner -->
      <div class="my-6">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-primary rounded-full animate-spin"></div>
      </div>
      
      <!-- Status message -->
      <div id="statusMessage" class="text-sm h-5 mb-4" style="color: var(--color-text-secondary)">
        ci siamo quasi...
      </div>
      
      <!-- Simple progress bar -->
      <div class="w-full bg-gray-200 rounded-full h-1.5 mb-4">
        <div class="bg-primary h-full rounded-full animate-[loading_2s_ease-in-out_infinite]"></div>
      </div>
      
      <!-- Tip text -->
      <p class="text-xs mt-2 tip" style="color: var(--color-text-secondary)">
        Loading resources
      </p>
    </div>
    
    <style>
      :root {
        --color-primary: #3a9b9b;
        --color-secondary: #6366f1;
        --color-background: #003737;
        --color-surface: #fdffff;
        --color-text: #1f2937;
        --color-text-secondary: #6b7280;
      }
      
      .text-primary {
        color: var(--color-primary);
      }
      
      .bg-primary {
        background-color: var(--color-primary);
      }
      
      .border-t-primary {
        border-top-color: var(--color-primary);
      }
    </style>
  <script src="flutter_bootstrap.js" async></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js" defer></script>

    <script>
      // Dynamic loading tips with improved rotation
      const tips = [
        "Caricando il timer...",
        "Scrapando gli esami...",
        "Calcolando la Streak...",
        "Facendo il caffè...",
        "Cercando l'oro nei fiumi..."
      ];

      const tipElement = document.querySelector('.tip');
      const statusElement = document.getElementById('statusMessage');
      let currentTipIndex = 0;

      // Typewriter effect for status messages
      function typeWriter(element, text, i = 0) {
        if (i === 0) element.textContent = '';
        
        if (i < text.length) {
          element.textContent += text.charAt(i);
          setTimeout(() => typeWriter(element, text, i + 1), 50);
        }
      }

      function rotateTips() {
        typeWriter(tipElement, tips[currentTipIndex]);
        currentTipIndex = (currentTipIndex + 1) % tips.length;
      }

      // Initial call and interval
      rotateTips();
      setInterval(rotateTips, 4000);
      
      // Also rotate main status messages
      const statusMessages = [
        "Preparing your learning environment...",
        "Initializing study assistant...",
        "Connecting to knowledge base..."
      ];
      
      let statusIndex = 0;
      setInterval(() => {
        typeWriter(statusElement, statusMessages[statusIndex]);
        statusIndex = (statusIndex + 1) % statusMessages.length;
      }, 3000);
    </script>
  </body>
    </script>
  
  <style>
  @keyframes loading {
    0% { width: 10%; }
    50% { width: 70%; }
    100% { width: 10%; }
  }
  </style>
</body>
</html>
